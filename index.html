    <style>
        #splash-pulse-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fff; /* Fundo limpo e branco */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* O wrapper do ícone que terá o efeito */
        .icone-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* O Ícone Real (Pode usar IMG ou Emoji) */
        .icone {
            font-size: 80px; /* Tamanho do emoji */
            z-index: 2; /* Fica por cima do pulso */
        }

        /* O Círculo Pulsante (Efeito de Brilho) */
        .pulso {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: rgba(231, 76, 60, 0.3); /* Cor do pulso (ex: vermelho) */
            border-radius: 50%;
            z-index: 1; /* Fica por baixo do ícone */
            animation: pulsar 2s infinite; /* Pulsa infinitamente até fechar */
        }

        /* --- Keyframes do Pulso --- */
        @keyframes pulsar {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }
