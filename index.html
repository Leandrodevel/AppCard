<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardapio by LPSource</title>
      <script src="https://cdn.tailwindcss.com"></script>
          <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        #splash-pulse-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fff; /* Fundo limpo e branco */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* O wrapper do ícone que terá o efeito */
        .icone-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* O Ícone Real (Pode usar IMG ou Emoji) */
        .icone {
            font-size: 80px; /* Tamanho do emoji */
            z-index: 2; /* Fica por cima do pulso */
        }

        /* O Círculo Pulsante (Efeito de Brilho) */
        .pulso {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: rgba(231, 76, 60, 0.3); /* Cor do pulso (ex: vermelho) */
            border-radius: 50%;
            z-index: 1; /* Fica por baixo do ícone */
            animation: pulsar 2s infinite; /* Pulsa infinitamente até fechar */
        }

        /* --- Keyframes do Pulso --- */
        @keyframes pulsar {
            0% {
                transform: scale(0.8);
                opacity: 1;
            }
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }
        
.tema-cores{
    
    background:red;
    
}
.tema-bg-claro{
    background: #EEFF2F;
}
.tema-text-base{
    
    color:red;
}
.tema-text-sec{
    color:#bbb;
}
.bg-image{
background-image: url(./img/img1.jpg);  
background-repeat: no-repeat;
  background-position: center;
  background-size: cover; /* Faz a imagem ocupar todo o espaço */
}
    </style>

</head>
<body>
    <section id="splash">
   
     <div id="splash-pulse-container">
        <div class="icone-wrapper text-center  relative">
            <div class="pulso"></div>
            <div class="icone flex flex-col">
              <h2 class="flex mb-2"><span class="font-black text-yellow-500">Card</span>
                <span class="text-gray-900 font-black ">ápio</span></h2>
              <small class="text-2xl text-left absolute bottom-0 left-[25px] italic text-gray-900">
                online</small><small class="text-[12px] absolute bottom-3 right-4">
                    by LP SOURCE</small></div>
        </div>
    </div>
 </section>
     <script>
document.addEventListener('DOMContentLoaded', () => { 
  
  setTimeout(() => {
    const splash = document.getElementById('splash-pulse-container');
    splash.style.transition = 'opacity 0.5s ease';
    splash.style.opacity = '0';
    const dados = JSON.parse(localStorage.getItem('userDados'));
  
    if ( dados && dados.logged  === true) {
       window.location.replace('home.html?comercio=budega');
        return false;
    }else if(!dados || dados.logged === false){
        window.location.replace('loginUsers.html');
        return false;
    }
  }, 1000); // 3 segundos é suficiente
 
});

 </script>
</body>
</html>
